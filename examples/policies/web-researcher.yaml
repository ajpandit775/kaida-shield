# Kaida Shield Policy: Web Researcher
# Generated from: "My bot searches the web for news articles about AI and saves summaries to ~/research"

name: web-researcher
description: Research bot that searches, reads, and summarizes web content
version: 1

allowed_domains:
  - google.com
  - bing.com
  - scholar.google.com
  - arxiv.org
  - news.ycombinator.com
  - reddit.com
  - wikipedia.org

allowed_paths:
  - ~/research/
  - ~/Documents/research/

blocked_patterns:
  - "rm -rf"
  - "curl * | bash"

anomaly_detection:
  max_requests_per_minute: 30
  loop_threshold: 0.6
  stall_timeout: 600
  max_token_burn: 100000
