# Kaida Shield Policy: Email Assistant
# Generated from: "My bot checks Gmail for new emails, drafts replies, and saves attachments to ~/Documents/email"

name: email-assistant
description: Email bot that reads, drafts, and organizes mail
version: 1

allowed_domains:
  - mail.google.com
  - gmail.com
  - smtp.gmail.com
  - imap.gmail.com

allowed_paths:
  - ~/Documents/email/
  - ~/Downloads/attachments/

blocked_patterns:
  - "rm -rf"
  - "curl * | bash"
  - "wget * | sh"

anomaly_detection:
  max_requests_per_minute: 20
  loop_threshold: 0.7
  stall_timeout: 300
  max_token_burn: 50000
